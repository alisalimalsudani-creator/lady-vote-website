<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Weather Dashboard</h1>
        <section id="search-section">
            <input type="text" id="city-input" placeholder="Enter city name...">
            <button id="search-btn">Search</button>
        </section>
    </header>
    <main>
        <section id="current-weather">
            <h2>Current Weather</h2>
            <div id="current-weather-display">
                <!-- Current weather details will be dynamically inserted here -->
            </div>
        </section>
        <section id="five-day-forecast">
            <h2>5-Day Forecast</h2>
            <div id="forecast-display">
                <!-- 5-day forecast details will be dynamically inserted here -->
            </div>
        </section>
        <section id="recent-searches">
            <h2>Recently Searched Cities</h2>
            <ul id="recent-search-list">
                <!-- Recently searched cities will be dynamically inserted here -->
            </ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
